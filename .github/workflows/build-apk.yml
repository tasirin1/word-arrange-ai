name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type APK (release/debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies with Expo
        run: |
          npm install
          npx expo install --fix

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          cd android
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          VERSION=$(node -p "require('./package.json').version")
          find android/app/build/outputs/apk/${BUILD_TYPE} -name '*.apk' | while read apk; do
            dir=$(dirname "$apk")
            mv "$apk" "${dir}/WordArrangeAI-v${VERSION}-${BUILD_TYPE}.apk"
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordArrangeAI-APK-${{ github.event.inputs.build_type || 'release' }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 60
