name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (development/preview/production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v9
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean

      - name: Build APK locally
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK (if keystore available)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
          export APK_PATH=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -n "$APK_PATH" ]; then
            jarsigner -verbose \
              -sigalg SHA1withRSA \
              -digestalg SHA1 \
              -keystore /tmp/keystore.jks \
              -storepass "$KEYSTORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              "$APK_PATH" "$KEY_ALIAS"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: word-arrange-ai-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 60

      - name: Upload debug APK (for testing)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: word-arrange-ai-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
