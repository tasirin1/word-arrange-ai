name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type APK (release/debug)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type || 'release' }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          for apk in android/app/build/outputs/apk/${BUILD_TYPE}/*.apk; do
            if [ -f "$apk" ]; then
              dir=$(dirname "$apk")
              ext="${apk##*.}"
              mv "$apk" "${dir}/WordArrangeAI-v${VERSION}-${BUILD_TYPE}.${ext}"
            fi
          done

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordArrangeAI-APK
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 60
